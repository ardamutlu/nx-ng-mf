name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # CHECKOUT
      - name: Checkout
        uses: actions/checkout@v4

      # NODE SETUP
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # NX AFFECTED
      - name: Lint affected
        run: npx nx affected --target=lint --base=origin/main

      - name: Test affected
        run: npx nx affected --target=test --base=origin/main

      - name: Build affected
        run: npx nx affected --target=build --base=origin/main

      # GCP AUTH
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # BUILD & PUSH (ALL APPS)
      - name: Build & Push Images
        run: |
          PROJECT=${{ secrets.GCP_PROJECT_ID }}
          REPO=${{ vars.GCP_REPOSITORY_NAME }}

          docker build -t europe-west1-docker.pkg.dev/$PROJECT/$REPO/shell:${{ github.sha }} apps/shell
          docker push europe-west1-docker.pkg.dev/$PROJECT/$REPO/shell:${{ github.sha }}

          docker build -t europe-west1-docker.pkg.dev/$PROJECT/$REPO/auth:${{ github.sha }} apps/auth
          docker push europe-west1-docker.pkg.dev/$PROJECT/$REPO/auth:${{ github.sha }}

          docker build -t europe-west1-docker.pkg.dev/$PROJECT/$REPO/dashboard:${{ github.sha }} apps/dashboard
          docker push europe-west1-docker.pkg.dev/$PROJECT/$REPO/dashboard:${{ github.sha }}
