name: CI/CD

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      # 1. CHECKOUT
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. NODE SETUP
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 3. NX AFFECTED (LINT, TEST, BUILD)
      - name: Nx Quality Checks
        run: |
          npx nx affected --target=lint --base=origin/main
          npx nx affected --target=test --base=origin/main
          npx nx affected --target=build --base=origin/main

      # 4. GCP AUTHENTICATION
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 5. GCLOUD SDK SETUP
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 6. DOCKER AUTH CONFIGURATION
      - name: Docker Auth
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      # 7. BUILD, PUSH & DEPLOY
      - name: Build and Deploy Apps
        run: |
          PROJECT=${{ secrets.GCP_PROJECT_ID }}
          REPO=${{ vars.GCP_REPOSITORY_NAME }}
          REGION="europe-west1"
          TAG=${{ github.sha }}

          # APPS listesini buraya ekliyoruz
          APPS=("shell" "auth" "dashboard")

          for APP in "${APPS[@]}"; do
            IMAGE="europe-west1-docker.pkg.dev/$PROJECT/$REPO/$APP:$TAG"

            echo "Processing $APP..."

            # Docker Build & Push
            docker build -t $IMAGE ./apps/$APP
            docker push $IMAGE

            # Cloud Run Deploy
            gcloud run deploy $APP \
              --image $IMAGE \
              --region $REGION \
              --platform managed \
              --allow-unauthenticated
          done
