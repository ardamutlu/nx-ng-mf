apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: shell

spec:
  replicas: 3

  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app: shell

  template:
    metadata:
      labels:
        app: shell

    spec:
      containers:
        - name: shell
          image: app/shell:latest
          ports:
            - containerPort: 80

  strategy:
    canary:
      stableService: shell
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 100
