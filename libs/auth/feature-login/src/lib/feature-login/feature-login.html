<hlm-card>
  <hlm-card-header>
    <h3 hlmCardTitle>Login to your account</h3>
    <p hlmCardDescription>Enter your email below to login to your account</p>
  </hlm-card-header>
  <div hlmCardContent>
    <form (ngSubmit)="login()" [formGroup]="form">
      <hlm-field-group>
        <hlm-field>
          <label for="email" hlmFieldLabel>Email</label>
          <input
            formControlName="email"
            hlmInput
            id="email"
            placeholder="m@example.com"
            type="email"
          />
          <hlm-field-error validator="required"
            >Email is required.</hlm-field-error
          >
          <hlm-field-error validator="email"
            >Enter a valid email address.</hlm-field-error
          >
        </hlm-field>
        <hlm-field>
          <div class="flex items-center">
            <label for="password" hlmFieldLabel>Password</label>
          </div>
          <input
            formControlName="password"
            hlmInput
            id="password"
            type="password"
          />
          <hlm-field-error validator="required"
            >Password is required.</hlm-field-error
          >
          <hlm-field-error validator="minlength"
            >Password must be at least 8 characters long.</hlm-field-error
          >
        </hlm-field>
        <hlm-field>
          <button [disabled]="form.invalid || isLoading()" hlmBtn type="submit">
            {{ 'auth.signin' | translate }}
          </button>
        </hlm-field>
        <hlm-field-separator>Or continue with</hlm-field-separator>
        <hlm-field>
          <button
            (click)="loginWithProvider(PassportStrategy.GitHub)"
            [disabled]="isLoading()"
            hlmBtn
            type="button"
            variant="outline"
          >
            <ng-icon class="text-xl" name="lucideGithub" />
            Login with GitHub
          </button>
          <button
            (click)="loginWithProvider(PassportStrategy.Google)"
            [disabled]="isLoading()"
            hlmBtn
            type="button"
            variant="outline"
          >
            Login with Google
          </button>
        </hlm-field>
      </hlm-field-group>
    </form>
  </div>
</hlm-card>
